services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oba-task-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      API_KEY: ${API_KEY:-dev-api-key}
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/oba
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests
      - ./alembic:/app/alembic
      - ./docker:/app/docker
      - ./main.py:/app/main.py
      - ./pyproject.toml:/app/pyproject.toml
      - ./uv.lock:/app/uv.lock
      - ./alembic.ini:/app/alembic.ini
    ports:
      - "8000:8000"

  db:
    image: postgres:16-alpine
    container_name: oba-task-db
    environment:
      POSTGRES_DB: oba
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d oba"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
